name: Release

on:
  schedule:
    - cron: '0 9 * * 2'
      timezone: Europe/London
  workflow_dispatch:

permissions:
  checks: write
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  # renovate: datasource=node-version depName=node versioning=node
  NODE_VERSION: 24
  LEFTHOOK: 0

jobs:
  verify:
    name: 🔎 Lint and Test
    runs-on: meza-ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        id: pnpm-install
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: latest
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - run: pnpm run ci

  release:
    needs: [verify]
    name: Release
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        id: pnpm-install
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: latest
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Build
        run: pnpm build && ls -la dist

      - name: 🚀 Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm release
